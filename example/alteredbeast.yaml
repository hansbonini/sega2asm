name: alteredbeast
# Altered Beast (USA, Europe) REV02 — Sega Genesis / Mega Drive
# SHA-1 verified against original ROM
sha1: "38945360D824D2FB9535B4FD7F25B9AA9B32F019"

options:
  platform: genesis
  region: ntsc
  basename: alteredbeast
  base_path: ./out/alteredbeast
  target_path: "../Altered Beast (USA, Europe).md"
  asm_path: asm
  asset_path: assets
  build_path: build
  symbols_path: ./alteredbeast_symbols.txt
  charmap_path: ./alteredbeast_sjis.tbl
  header_output: true
  incbin: true

# ROM: 512 KB original (valid range $000000–$07FFFF)
# ⚠  CURRENT PROJECT STATE: The Z80 drivers include embedded music data (7–8 KB each),
#    expanding the total ROM to ~$08C894 bytes (~563 KB). The SHA1 check will fail
#    until the GFX/audio offsets in the main 68k ASM are reconciled.
#    Addresses below reflect the REBUILT ROM layout, not the original game ROM.
#
# All segment start addresses extracted from hansbonini/smd_alteredbeast Makefile
# and split.txt. Z80 driver boundaries measured from compiled .bin files.
#
# Layout overview:
#   $000000–$0001FF   ROM header + interrupt vectors
#   $000200–$000138EB M68K code (palettes + raw gfx embedded within)
#   $000138EC–$0001FFFF PCM voice samples (6 clips)
#   $00020000–$02D31E  Z80 drivers (7 programs, ~7-8 KB each, org $0000)
#   $02D31E–$030894   $FF padding ($3576 bytes)
#   $030894–$08C894   GFX assets (SegaRD/Nemesis compressed) — shifted +$C894 from original
#   (original ROM had GFX at $024000–$07FFFF)
#   $00060B66–$0007E36F Data (unknown structure — level maps / extra GFX)
#   $0007E370–$0007FFFF GFX assets SegaRD-compressed (fireballs / game-over / font)

segments:

