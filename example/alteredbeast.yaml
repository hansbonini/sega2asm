name: alteredbeast
# Altered Beast (USA, Europe) REV02 — Sega Genesis / Mega Drive
# SHA-1 verified against original ROM
sha1: "38945360D824D2FB9535B4FD7F25B9AA9B32F019"

options:
  platform: genesis
  region: ntsc
  basename: alteredbeast
  base_path: ./out/alteredbeast
  target_path: "./Altered Beast (USA, Europe).md"
  asm_path: asm
  asset_path: assets
  build_path: build
  symbols_path: ./alteredbeast_symbols.txt
  charmap_path: ./alteredbeast_sjis.tbl
  header_output: true
  incbin: false

# ROM: 512 KB original (valid range $000000–$07FFFF)
# ⚠  CURRENT PROJECT STATE: The Z80 drivers include embedded music data (7–8 KB each),
#    expanding the total ROM to ~$08C894 bytes (~563 KB). The SHA1 check will fail
#    until the GFX/audio offsets in the main 68k ASM are reconciled.
#    Addresses below reflect the REBUILT ROM layout, not the original game ROM.
#
# All segment start addresses extracted from hansbonini/smd_alteredbeast Makefile
# and split.txt. Z80 driver boundaries measured from compiled .bin files.
#
# Layout overview:
#   $000000–$0001FF   ROM header + interrupt vectors
#   $000200–$000138EB M68K code (palettes + raw gfx embedded within)
#   $000138EC–$0001FFFF PCM voice samples (6 clips)
#   $00020000–$02D31E  Z80 drivers (7 programs, ~7-8 KB each, org $0000)
#   $02D31E–$030894   $FF padding ($3576 bytes)
#   $030894–$08C894   GFX assets (SegaRD/Nemesis compressed) — shifted +$C894 from original
#   (original ROM had GFX at $024000–$07FFFF)
#   $00060B66–$0007E36F Data (unknown structure — level maps / extra GFX)
#   $0007E370–$0007FFFF GFX assets SegaRD-compressed (fireballs / game-over / font)

segments:

  # ── ROM Header ─────────────────────────────────────────────────────────────
  - name: header
    type: header
    start: 0x000000
    end:   0x000200

  # ── Main 68000 Code ─────────────────────────────────────────────────────────
  # Contains inline palette data and raw sprite sheets.
  # Notable embedded data addresses (all from Makefile / splitrom):
  #   $00009FB4  raw sprite sheet (1568 bytes, gfxdump palette $00009F94)
  #   $0000BD72  raw sprite sheet (160 bytes,  gfxdump palette $0000BCB4)
  #   $0000BCB4–$0000BD69 palette binary blocks (asm68k compiled)
  - name: main_code
    type: m68k
    start: 0x000200
    end:   0x000138EC

  # ── PCM Voice Samples ───────────────────────────────────────────────────────
  # File names in smd_alteredbeast/audio/pcm/ ARE the ROM offsets.
  # Sample rates from Makefile wav2pcm / pcm2wav invocations.

  - name: pcm_power_up
    type: pcm
    sample_rate: 8000
    start: 0x000138EC
    end:   0x0001552C
    subdir: audio/pcm

  - name: pcm_die_scream
    type: pcm
    sample_rate: 4000
    start: 0x0001552C
    end:   0x000173B4
    subdir: audio/pcm

  - name: pcm_transform_scream
    type: pcm
    sample_rate: 4000
    start: 0x000173B4
    end:   0x0001AFD4
    subdir: audio/pcm

  - name: pcm_boss_laugh
    type: pcm
    sample_rate: 4000
    start: 0x0001AFD4
    end:   0x0001CF56
    subdir: audio/pcm

  - name: pcm_rise_from_grave
    type: pcm
    sample_rate: 4000
    start: 0x0001CF56
    end:   0x0001EED8
    subdir: audio/pcm

  - name: pcm_welcome_to_doom
    type: pcm
    sample_rate: 4000
    start: 0x0001EED8
    end:   0x00020000
    subdir: audio/pcm

  # ── Z80 Sound Driver block ($020000–$024000) ───────────────────────────────
  # The $4000-byte block contains 7 drivers assembled with sjasmplus, in order:
  #
  #   ROM order   File                           Z80 org
  #   ─────────── ────────────────────────────── ──────────
  #   pcm_1       z80/pcm_driver/pcm_driver1.asm $0000
  #   pcm_2       z80/pcm_driver/pcm_driver2.asm $0000
  #   pcm_3       z80/pcm_driver/pcm_driver3.asm $0000
  #   sounddriver z80/sounddriver.asm            $0000
  #   pcm_6       z80/pcm_driver/pcm_driver6.asm $0000
  #   pcm_4       z80/pcm_driver/pcm_driver4.asm $0000
  #   pcm_5       z80/pcm_driver/pcm_driver5.asm $0000
  #
  # Each driver is a complete standalone Z80 program (org $0000).  The 68k loads
  # them into Z80 RAM at $A00000 on demand, replacing the previous driver.
  #
  # Total code:     $0A8A bytes ($020000–$020A8A)
  # $FF padding:    $3576 bytes ($020A8A–$024000)
  #
  # Individual driver boundaries require the compiled .bin files or the ROM to
  # measure.  The single z80 segment below disassembles the full code region as
  # one continuous Z80 stream.  Split into separate segments once each .bin size
  # is known (run `sjasmplus --lst` on each .asm and check the reported size, or
  # binary-diff the compiled ROM at $020000 against each .bin file).

  # ── Z80 Sound Driver block ───────────────────────────────────────────────────
  # 7 complete Z80 images stored sequentially in ROM (each even-aligned).
  # Layout per driver: [Z80 code: org $0000] + [embedded PCM/music data]
  # The 68k copies the selected driver to Z80 RAM ($A00000) on demand.
  #
  # ROM order:  pcm_driver1 · pcm_driver2 · pcm_driver3 · sounddriver
  #             pcm_driver6 · pcm_driver4 · pcm_driver5

  # BGM set 1 — Z80 driver code (org $0000, 384 = $0180 bytes)
  - name: z80_pcm_driver1
    type: z80
    start: 0x00020000
    end:   0x00020180
    z80_org: 0x0000
    subdir: z80/pcm_driver1

  # BGM set 1 — embedded PCM/music data (Z80 addr $0180–$1C3F, 6848 = $1AC0 bytes)
  - name: pcm_pcm_driver1
    type: bin
    start: 0x00020180
    end:   0x00021C40
    subdir: z80/pcm_driver1

  # BGM set 2 — Z80 driver code (org $0000, 384 = $0180 bytes)
  - name: z80_pcm_driver2
    type: z80
    start: 0x00021C40
    end:   0x00021DC0
    z80_org: 0x0000
    subdir: z80/pcm_driver2

  # BGM set 2 — embedded PCM/music data (Z80 addr $0180–$1E87, 7432 = $1D08 bytes)
  - name: pcm_pcm_driver2
    type: bin
    start: 0x00021DC0
    end:   0x00023AC8
    subdir: z80/pcm_driver2

  # BGM set 3 — Z80 driver code (org $0000, 384 = $0180 bytes)
  - name: z80_pcm_driver3
    type: z80
    start: 0x00023AC8
    end:   0x00023C48
    z80_org: 0x0000
    subdir: z80/pcm_driver3

  # BGM set 3 — embedded PCM/music data (Z80 addr $0180–$1F68, 7658 = $1DEA bytes)
  - name: pcm_pcm_driver3
    type: bin
    start: 0x00023C48
    end:   0x00025A32
    subdir: z80/pcm_driver3

  # main FM/PSG sound driver — Z80 driver code (org $0000, 4595 = $11F3 bytes)
  - name: z80_sounddriver
    type: z80
    start: 0x00025A32
    end:   0x00026C25
    z80_org: 0x0000
    subdir: z80/sounddriver

  # main FM/PSG sound driver — embedded PCM/music data (Z80 addr $11F3–$1CB5, 2755 = $0AC3 bytes)
  - name: pcm_sounddriver
    type: bin
    start: 0x00026C25
    end:   0x000276E8
    subdir: z80/sounddriver

  # BGM set 6 — Z80 driver code (org $0000, 384 = $0180 bytes)
  - name: z80_pcm_driver6
    type: z80
    start: 0x000276E8
    end:   0x00027868
    z80_org: 0x0000
    subdir: z80/pcm_driver6

  # BGM set 6 — embedded PCM/music data (Z80 addr $0180–$1F80, 7682 = $1E02 bytes)
  - name: pcm_pcm_driver6
    type: bin
    start: 0x00027868
    end:   0x0002966A
    subdir: z80/pcm_driver6

  # BGM set 4 — Z80 driver code (org $0000, 384 = $0180 bytes)
  - name: z80_pcm_driver4
    type: z80
    start: 0x0002966A
    end:   0x000297EA
    z80_org: 0x0000
    subdir: z80/pcm_driver4

  # BGM set 4 — embedded PCM/music data (Z80 addr $0180–$1F80, 7682 = $1E02 bytes)
  - name: pcm_pcm_driver4
    type: bin
    start: 0x000297EA
    end:   0x0002B5EC
    subdir: z80/pcm_driver4

  # BGM set 5 — Z80 driver code (org $0000, 384 = $0180 bytes)
  - name: z80_pcm_driver5
    type: z80
    start: 0x0002B5EC
    end:   0x0002B76C
    z80_org: 0x0000
    subdir: z80/pcm_driver5

  # BGM set 5 — embedded PCM/music data (Z80 addr $0180–$1D30, 7090 = $1BB2 bytes)
  - name: pcm_pcm_driver5
    type: bin
    start: 0x0002B76C
    end:   0x0002D31E
    subdir: z80/pcm_driver5

  # $FF fill separating Z80 block from GFX data
  - name: z80_padding
    type: bin
    start: 0x0002D31E
    end:   0x00030894   # $3576 bytes
    subdir: z80

  # ── GFX — SegaRD Compressed ─────────────────────────────────────────────────
