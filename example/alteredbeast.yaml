    start: 0x0001552C
    end:   0x00017234
    subdir: audio/pcm

  - name: z80_pcm_driver3
    type: z80
    start: 0x00017234
    end:   0x000173B4
    z80_org: 0x0000
    subdir: z80/pcm_driver3

  - name: pcm_transform_scream
